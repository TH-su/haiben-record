<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<!-- 機微情報を含むためキャッシュ無効 -->
<meta http-equiv="Cache-Control" content="no-store">
<meta name="robots" content="noindex,nofollow">
<title>入居者マスタ</title>
<style>
:root{
  --pri:#1a73e8; --pri-l:#e8f0fe; --pri-d:#1557b0;
  --ok:#2e7d32; --ok-l:#e8f5e9; --ng:#c62828; --ng-l:#ffebee;
  --warn-bg:#fff8e1; --warn-tx:#e65100;
  --g0:#f8f9fa; --g1:#f1f3f4; --g2:#e8eaed; --g3:#dadce0;
  --g5:#9aa0a6; --g6:#80868b; --g7:#5f6368; --g9:#202124;
  --r:12px; --sh:0 1px 6px rgba(0,0,0,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
  background:var(--g0); color:var(--g9); font-size:15px; line-height:1.5; padding-bottom:72px;}
button{font-family:inherit; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:15px}

/* ── ヘッダー ── */
.hdr{position:sticky; top:0; z-index:50; background:var(--pri); color:#fff;
  padding:10px 14px; display:flex; align-items:center; gap:10px; box-shadow:var(--sh)}
.hdr h1{font-size:17px; margin:0; font-weight:700; flex:1}
.hdr .sync{font-size:12px; background:rgba(255,255,255,.18); padding:3px 9px; border-radius:14px; white-space:nowrap}
.hdr .sync.ok{background:rgba(46,125,50,.9)} .hdr .sync.err{background:rgba(198,40,40,.95)}

/* ── 画面切替 ── */
.scr{display:none; padding:14px; max-width:980px; margin:0 auto}
.scr.on{display:block}

/* ── カード ── */
.cd{background:#fff; border-radius:var(--r); box-shadow:var(--sh); padding:14px; margin-bottom:12px}

/* ── 一覧 ── */
.search-bar{display:flex; gap:8px; margin-bottom:12px; align-items:center}
.search-bar input{flex:1; padding:10px 12px; border:1px solid var(--g3); border-radius:10px}
.filter-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.chip{padding:5px 12px; border:1px solid var(--g3); border-radius:16px; background:#fff; font-size:13px; color:var(--g7)}
.chip.on{background:var(--pri); color:#fff; border-color:var(--pri)}
.rlist{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px}
.rcard{background:#fff; border:1px solid var(--g2); border-radius:10px; padding:12px; cursor:pointer; transition:.12s}
.rcard:hover{box-shadow:var(--sh); border-color:var(--pri)}
.rcard .nm{font-size:16px; font-weight:700}
.rcard .kn{font-size:11px; color:var(--g6)}
.rcard .meta{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap}
.tag{font-size:11px; padding:2px 8px; border-radius:10px; background:var(--g1); color:var(--g7)}
.tag.care{background:var(--pri-l); color:var(--pri-d)} .tag.room{background:#ede7f6; color:#5e35b1}
.tag.out{background:var(--ng-l); color:var(--ng)}
.empty{text-align:center; color:var(--g5); padding:40px 10px}

/* ── 詳細（印刷レイアウト） ── */
.sheet{background:#fff; border:2px solid var(--g9); border-radius:6px; overflow:hidden}
.sheet .sec{display:flex; border-top:1px solid var(--g9)}
.sheet .sec:first-child{border-top:none}
.sheet .sec-lbl{writing-mode:vertical-rl; text-orientation:upright; background:var(--g1);
  border-right:1px solid var(--g9); padding:8px 4px; font-weight:700; font-size:13px; min-width:34px;
  display:flex; align-items:center; justify-content:center; letter-spacing:2px}
.sheet .sec-body{flex:1; min-width:0}
.grid{display:grid; gap:0}
.cell{border-right:1px solid var(--g3); border-bottom:1px solid var(--g3); padding:6px 8px; min-width:0}
.cell:last-child{border-right:none}
.cell .lab{font-size:11px; color:var(--g6); display:block; margin-bottom:2px}
.cell .val{font-size:15px; word-break:break-word; white-space:pre-wrap}
.cell .val.big{font-size:18px; font-weight:700}
.row-cells{display:flex; flex-wrap:wrap}
.row-cells .cell{flex:1}
.fulltext{white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.6}
.rhythm{display:flex; flex-wrap:wrap; gap:4px 14px; font-size:14px}
.rhythm span b{color:var(--pri-d)}

.detail-actions{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap}
.btn{padding:10px 16px; border:none; border-radius:10px; font-size:14px; font-weight:700; min-height:44px}
.btn-pri{background:var(--pri); color:#fff} .btn-ok{background:var(--ok); color:#fff}
.btn-sec{background:#fff; color:var(--pri); border:1px solid var(--pri)}
.btn-gray{background:var(--g2); color:var(--g7)} .btn-ng{background:#fff;color:var(--ng);border:1px solid var(--ng)}
.btn:disabled{opacity:.5}

/* ── 編集フォーム ── */
.fgroup{margin-bottom:18px}
.fgroup h3{font-size:14px; color:var(--pri-d); border-left:4px solid var(--pri); padding-left:8px; margin:0 0 10px}
.fgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px}
.fld{display:flex; flex-direction:column}
.fld.wide{grid-column:1/-1}
.fld label{font-size:12px; color:var(--g7); margin-bottom:3px}
.fld input,.fld select,.fld textarea{padding:9px 10px; border:1px solid var(--g3); border-radius:8px; width:100%}
.fld textarea{min-height:72px; resize:vertical}
.fam-row{display:grid; grid-template-columns:1fr 1fr; gap:6px; border:1px solid var(--g2); border-radius:8px; padding:8px; margin-bottom:8px}
.fam-row .full{grid-column:1/-1}
.fam-del{justify-self:end; background:none; border:none; color:var(--ng); font-size:13px}

/* ── ボトムナビ ── */
.bnav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--g2);
  display:flex; z-index:50; box-shadow:0 -1px 6px rgba(0,0,0,.08)}
.bnav button{flex:1; border:none; background:none; padding:8px 4px; font-size:11px; color:var(--g6);
  display:flex; flex-direction:column; align-items:center; gap:2px; min-height:56px; justify-content:center}
.bnav button.on{color:var(--pri)} .bnav button .ic{font-size:20px}

/* ── トースト ── */
#toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--g9); color:#fff; padding:10px 18px; border-radius:22px; font-size:14px; z-index:200;
  opacity:0; transition:.25s; pointer-events:none; max-width:90%; text-align:center}
#toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

/* ── モーダル ── */
.modal{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; display:none; align-items:center; justify-content:center; padding:16px}
.modal.on{display:flex}
.modal .box{background:#fff; border-radius:var(--r); max-width:520px; width:100%; max-height:88vh; overflow:auto; padding:18px}
.modal h2{font-size:16px; margin:0 0 12px}
.muted{color:var(--g6); font-size:12px}

/* ── 印刷 ── */
@media print{
  body{padding:0; background:#fff}
  .hdr,.bnav,.detail-actions,#toast,.modal{display:none !important}
  .scr{padding:0; max-width:none}
  .scr:not(.on){display:none}
  .sheet{border:2px solid #000; page-break-inside:avoid}
  .sheet .sec{border-top:1px solid #000}
  .cell{border-color:#999}
  @page{size:A4; margin:10mm}
}
.loading{text-align:center; color:var(--g5); padding:30px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🗂️ 入居者マスタ</h1>
  <span class="sync" id="syncStatus">未接続</span>
</div>

<!-- ════════ 一覧 ════════ -->
<section class="scr on" id="sc-list">
  <div class="search-bar">
    <input type="search" id="q" placeholder="氏名・ふりがな・居室で検索" autocomplete="off">
  </div>
  <div class="filter-row" id="filterRow">
    <button class="chip on" data-f="active">在籍</button>
    <button class="chip" data-f="out">退去</button>
    <button class="chip" data-f="all">すべて</button>
  </div>
  <div id="rosterBox"><div class="loading">読み込み中…</div></div>
</section>

<!-- ════════ 詳細（印刷ページ） ════════ -->
<section class="scr" id="sc-view">
  <div class="detail-actions">
    <button class="btn btn-gray" id="backBtn">← 一覧</button>
    <button class="btn btn-pri" id="editBtn">✏️ 編集</button>
    <button class="btn btn-sec" id="printBtn">🖨️ 印刷</button>
  </div>
  <div id="viewBox"><div class="loading">読み込み中…</div></div>
</section>

<!-- ════════ 編集 ════════ -->
<section class="scr" id="sc-edit">
  <div class="detail-actions">
    <button class="btn btn-gray" id="editCancel">← 取消</button>
    <button class="btn btn-ok" id="saveBtn">💾 保存</button>
  </div>
  <div id="editBox"></div>
</section>

<!-- ボトムナビ -->
<nav class="bnav">
  <button class="on" data-sc="list"><span class="ic">📋</span>一覧</button>
  <button data-sc="new"><span class="ic">➕</span>新規</button>
  <button data-sc="sync"><span class="ic">☁️</span>同期設定</button>
</nav>

<!-- 同期設定モーダル -->
<div class="modal" id="mSync">
  <div class="box">
    <h2>☁️ クラウド同期設定</h2>
    <div class="fld" style="margin-bottom:10px">
      <label>GAS Web App URL</label>
      <input id="cfgUrl" placeholder="https://script.google.com/macros/s/..../exec">
    </div>
    <div class="fld" style="margin-bottom:10px">
      <label>アクセストークン</label>
      <input id="cfgToken" placeholder="GASのスクリプトプロパティと一致させる">
    </div>
    <p class="muted">URL・トークンはこの端末にのみ保存され、入居者の機微情報は端末に残しません。</p>
    <div class="detail-actions" style="margin-top:14px">
      <button class="btn btn-gray" id="syncClose">閉じる</button>
      <button class="btn btn-sec" id="syncTest">接続テスト</button>
      <button class="btn btn-ok" id="syncSave">保存して再読込</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   入居者マスタ / 管理アプリ
   - 保存先: Google スプレッドシート + GAS Web App（トークン認証）
   - 機微情報（医療・家族連絡先等）は localStorage に保存しない
   - 一覧/検索用の roster（id/氏名/ふりがな/居室/介護度）のみ端末キャッシュ
   - 描画は全て esc() でエスケープ（XSS防止）。保存はホワイトリスト方式
   ─ 他アプリ連携用 API（GAS）─
     GET  ?action=getRoster&token=..[&since=ISO]   → 軽量リスト
     GET  ?action=getResident&id=..&token=..        → 個人フル
     GET  ?action=getSection&id=..&section=medical&token=..
     POST {action:'saveResident', token, record}    → upsert
   ═══════════════════════════════════════════════════════════════ */

/* ── 設定（端末ローカル。機微情報ではない） ── */
var CFG_KEY='rmaster_cfg';
var ROSTER_KEY='rmaster_roster'; // 非機微の一覧キャッシュのみ
var CFG={url:'', token:''};
(function loadCfg(){try{var s=localStorage.getItem(CFG_KEY);if(s){var o=JSON.parse(s);CFG.url=o.url||'';CFG.token=o.token||''}}catch(e){}})();

/* ── ユーティリティ ── */
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('on')},2600)}
function setSync(txt,cls){var e=$('syncStatus');e.textContent=txt;e.className='sync'+(cls?(' '+cls):'')}

function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtJDate(iso){if(!iso)return'';var p=String(iso).slice(0,10).split('-');if(p.length<3)return iso;return p[0]+'年'+parseInt(p[1],10)+'月'+parseInt(p[2],10)+'日'}
function calcAge(birthISO){if(!birthISO)return'';var b=new Date(birthISO);if(isNaN(b))return'';var n=new Date();var a=n.getFullYear()-b.getFullYear();var m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a>=0&&a<140?a:''}
function calcBMI(h,w){h=parseFloat(h);w=parseFloat(w);if(!h||!w)return'';var b=w/Math.pow(h/100,2);return isFinite(b)?b.toFixed(1):''}
function calcStayDays(adm,dis){if(!adm)return'';var a=new Date(adm);if(isNaN(a))return'';var end=dis?new Date(dis):new Date();var d=Math.floor((end-a)/86400000);return d>=0?d:''}
function copayLabel(v){return v?(String(v).replace(/[^0-9]/g,'')+'割'):''}

/* ── マスタ項目スキーマ（編集フォーム生成・連携の単一定義） ── */
var SECTIONS={
  basic:['gender','birthDate','careLevel','careCertStart','careCertEnd','copayRate','welfare',
         'admissionDate','dischargeDate','height','weight','adl','dementia'],
  note:['preAdmission','postDischarge'],
  family:['family'],
  office:['careOffice','careManager','careOfficeTel','careOfficeFax','welfareEquip','welfareEquipStaff','welfareEquipTel','rhythm'],
  medical:['hospital','doctor','hospitalTel','hospitalFax','emergencyHospital','pharmacy','pharmacyTel','pharmacyFax',
           'allergy','currentDiseases','sideEffects','pastHistory','medsRegular','medsNotes','problemBehavior']
};
// 対象アプリ（各ケアアプリに表示・記録する対象者かのフラグ）
// 既定は全てON（介護現場では対象者の取りこぼしを避けるため。対象外を明示的に外す運用）
var APP_TARGETS=[['excretion','排泄記録'],['weight','体重記録'],['schedule','週間計画']];
function defaultTargetApps(){return APP_TARGETS.map(function(p){return p[0]})}
// 保存時に許可するキー（ホワイトリスト）
var ALLOWED_KEYS=['id','name','kana','room','gender','careLevel','active','updatedAt','targetApps',
  'birthDate','careCertStart','careCertEnd','copayRate','welfare','admissionDate','dischargeDate','height','weight','adl','dementia',
  'preAdmission','postDischarge','family','careOffice','careManager','careOfficeTel','careOfficeFax',
  'welfareEquip','welfareEquipStaff','welfareEquipTel','rhythm',
  'hospital','doctor','hospitalTel','hospitalFax','emergencyHospital','pharmacy','pharmacyTel','pharmacyFax',
  'allergy','currentDiseases','sideEffects','pastHistory','medsRegular','medsNotes','problemBehavior','xref'];
var RHYTHM_KEYS=[['wake','起床'],['breakfast','朝食'],['lunch','昼食'],['snack','おやつ'],['dinner','夕食'],['sleep','就寝']];

/* ═══════════ API（トークン付き・タイムアウト・エラー処理） ═══════════ */
function apiGet(params,timeoutMs){
  if(!CFG.url)return Promise.reject(new Error('NO_URL'));
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k])}).join('&');
  qs+='&token='+encodeURIComponent(CFG.token);
  return fetchWithTimeout(CFG.url+'?'+qs,{method:'GET'},timeoutMs||12000).then(parseJson);
}
function apiPost(body,timeoutMs){
  if(!CFG.url)return Promise.reject(new Error('NO_URL'));
  body.token=CFG.token;
  // text/plain で送信（GAS の CORS プリフライト回避）
  return fetchWithTimeout(CFG.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)},timeoutMs||15000).then(parseJson);
}
function fetchWithTimeout(url,opt,ms){
  return new Promise(function(res,rej){
    var ctl=('AbortController'in window)?new AbortController():null;
    if(ctl)opt.signal=ctl.signal;
    var t=setTimeout(function(){if(ctl)ctl.abort();rej(new Error('タイムアウト'))},ms);
    fetch(url,opt).then(function(r){clearTimeout(t);res(r)}).catch(function(e){clearTimeout(t);rej(e)});
  });
}
function parseJson(r){return r.text().then(function(t){var d;try{d=JSON.parse(t)}catch(e){throw new Error('応答が不正です')}if(d&&d.error)throw new Error(d.error);return d})}

/* ═══════════ roster（軽量一覧） ═══════════ */
var roster=[]; // [{id,name,kana,room,gender,careLevel,active,updatedAt}]
function loadRosterCache(){try{var s=localStorage.getItem(ROSTER_KEY);if(s)roster=JSON.parse(s)||[]}catch(e){roster=[]}}
function saveRosterCache(){try{localStorage.setItem(ROSTER_KEY,JSON.stringify(roster))}catch(e){}}
function refreshRoster(){
  if(!CFG.url){setSync('未接続');renderRoster();return Promise.resolve(false)}
  setSync('同期中…');
  return apiGet({action:'getRoster'}).then(function(d){
    var list=(d&&d.roster)||d||[];
    if(Array.isArray(list)){roster=list.map(normRosterRow);saveRosterCache();writeCommonRoster()}
    setSync('同期OK','ok');renderRoster();return true;
  }).catch(function(e){
    setSync('オフライン','err');renderRoster();
    if(e.message!=='NO_URL')toast('⚠️ 一覧の取得に失敗: '+e.message);
    return false;
  });
}
function _toTargetArr(v){
  if(Array.isArray(v))return v.slice();
  if(typeof v==='string'&&v)return v.split(',').map(function(s){return s.trim()}).filter(Boolean);
  return null; // 未設定（フラグ無し）は null のまま＝消費側で「従来どおり表示」の no-op 扱い
}
function normRosterRow(r){
  var t=_toTargetArr(r.targetApps);
  var o={id:r.id,name:r.name||'',kana:r.kana||'',room:r.room||'',gender:r.gender||'',careLevel:r.careLevel||'',active:r.active!==false,updatedAt:r.updatedAt||''};
  if(t)o.targetApps=t;
  return o;
}

/* ═══════════ 共通情報の自動コピー（全アプリ連携） ═══════════
   同一オリジンの全ツールが共有する localStorage キーに、識別/表示用の共通項目だけを
   書き出す。各アプリはこれを読み込んで自分の入居者リストへ自動反映する（ネットワーク不要・
   即時・オフライン可）。機微情報（医療・家族連絡先等）は一切含めない。
   ─ 連携契約 ─
     key: 'su_residents_common'
     value: { v:1, updatedAt:ISO, residents:[{masterId,name,kana,room,gender,careLevel,active}] } */
var COMMON_KEY='su_residents_common';
var COMMON_FIELDS=['name','kana','room','gender','careLevel'];
function writeCommonRoster(){
  try{
    var residents=roster.map(function(r){
      var e={masterId:r.id,name:r.name||'',kana:r.kana||'',room:r.room||'',gender:r.gender||'',careLevel:r.careLevel||'',active:r.active!==false};
      if(Array.isArray(r.targetApps))e.targetApps=r.targetApps.slice(); // 対象アプリのフラグも配信
      return e;
    });
    localStorage.setItem(COMMON_KEY,JSON.stringify({v:1,updatedAt:new Date().toISOString(),residents:residents}));
  }catch(e){/* 共有キャッシュは失敗しても本体運用に影響させない */}
}

var curFilter='active';
function renderRoster(){
  var q=($('q').value||'').trim().toLowerCase();
  var box=$('rosterBox');
  var list=roster.filter(function(r){
    if(curFilter==='active'&&r.active===false)return false;
    if(curFilter==='out'&&r.active!==false)return false;
    if(q){var hay=((r.name||'')+' '+(r.kana||'')+' '+(r.room||'')).toLowerCase();if(hay.indexOf(q)<0)return false}
    return true;
  }).sort(function(a,b){return String(a.room||'').localeCompare(String(b.room||''),'ja')||String(a.kana||'').localeCompare(String(b.kana||''),'ja')});
  if(!list.length){box.innerHTML='<div class="empty">'+(roster.length?'該当する入居者がいません':'入居者がいません。「同期設定」でURLを設定するか「新規」で登録してください')+'</div>';return}
  var html='<div class="rlist">';
  list.forEach(function(r){
    html+='<div class="rcard" data-id="'+esc(r.id)+'">'+
      '<div class="nm">'+esc(r.name)+'</div>'+
      (r.kana?'<div class="kn">'+esc(r.kana)+'</div>':'')+
      '<div class="meta">'+
        (r.room?'<span class="tag room">'+esc(r.room)+'号室</span>':'')+
        (r.careLevel?'<span class="tag care">'+esc(r.careLevel)+'</span>':'')+
        (r.active===false?'<span class="tag out">退去</span>':'')+
      '</div></div>';
  });
  html+='</div>';
  box.innerHTML=html;
  Array.prototype.forEach.call(box.querySelectorAll('.rcard'),function(el){
    el.addEventListener('click',function(){openResident(this.getAttribute('data-id'))});
  });
}

/* ═══════════ 個人フル取得・表示（都度取得・キャッシュしない） ═══════════ */
var curResident=null;
function openResident(id){
  showScreen('view');
  $('viewBox').innerHTML='<div class="loading">読み込み中…</div>';
  if(!CFG.url){$('viewBox').innerHTML='<div class="empty">同期設定のURLが未設定です</div>';return}
  apiGet({action:'getResident',id:id}).then(function(d){
    var rec=(d&&d.record)||d;
    if(!rec||rec.id==null){throw new Error('該当データなし')}
    curResident=rec; renderView(rec);
  }).catch(function(e){$('viewBox').innerHTML='<div class="empty">取得に失敗しました: '+esc(e.message)+'</div>'});
}

function cell(lab,val,big){return'<div class="cell"><span class="lab">'+esc(lab)+'</span><span class="val'+(big?' big':'')+'">'+esc(val||'　')+'</span></div>'}
function renderView(r){
  var fam=Array.isArray(r.family)?r.family:[];
  var famName=fam.map(function(f,i){return '①②③④⑤'.charAt(i)+(f.name||'')+(f.relation?'（'+f.relation+'）':'')+(f.role?' '+f.role:'')}).join('\n');
  var famAddr=fam.map(function(f,i){return f.address?('①②③④⑤'.charAt(i)+f.address):''}).filter(Boolean).join('\n');
  var famTel=fam.map(function(f,i){return f.phone?('①②③④⑤'.charAt(i)+f.phone):''}).filter(Boolean).join('\n');
  var emg=fam.filter(function(f){return f.emergency}).map(function(f,i){return '①②③④⑤'.charAt(i)+(f.name||'')+(f.relation?'（'+f.relation+'）':'')}).join('\n');
  var rhythm=r.rhythm||{};
  var rh=RHYTHM_KEYS.map(function(p){return rhythm[p[0]]?('<span>'+esc(p[1])+' <b>'+esc(rhythm[p[0]])+'</b></span>'):''}).filter(Boolean).join('');

  var h='<div class="sheet">';
  // 利用者基本情報
  h+='<div class="sec"><div class="sec-lbl">基本情報</div><div class="sec-body">'+
    '<div class="row-cells">'+
      cell('氏名',r.name,true)+cell('性別',r.gender)+cell('生年月日',fmtJDate(r.birthDate))+
      cell('年齢',calcAge(r.birthDate)?calcAge(r.birthDate)+'歳':'')+cell('介護度',r.careLevel)+
      cell('認定期間',(r.careCertStart||'')+(r.careCertEnd?(' 〜 '+r.careCertEnd):''))+
      cell('負担割合',copayLabel(r.copayRate))+cell('生保',r.welfare?'有':'')+
    '</div>'+
    '<div class="row-cells">'+
      cell('入居日',r.admissionDate)+cell('退去日',r.dischargeDate)+
      cell('入居期間',calcStayDays(r.admissionDate,r.dischargeDate)?calcStayDays(r.admissionDate,r.dischargeDate)+'日':'')+
      cell('BMI',calcBMI(r.height,r.weight))+cell('身長',r.height?r.height+' cm':'')+cell('体重',r.weight?r.weight+' kg':'')+
      cell('生活自立度',r.adl)+cell('認知症自立度',r.dementia)+
    '</div></div></div>';
  // 基本事項
  h+='<div class="sec"><div class="sec-lbl">基本事項</div><div class="sec-body">'+
    '<div class="cell" style="border-right:none"><span class="lab">入居前状況</span><div class="fulltext">'+esc(r.preAdmission||'　')+'</div></div>'+
    '<div class="cell" style="border-right:none;border-bottom:none"><span class="lab">退去後状況（行き先等）</span><div class="fulltext">'+esc(r.postDischarge||'　')+'</div></div></div></div>';
  // 家族情報
  h+='<div class="sec"><div class="sec-lbl">家族情報</div><div class="sec-body"><div class="row-cells">'+
    '<div class="cell" style="flex:1.2"><span class="lab">ご家族氏名</span><div class="fulltext">'+esc(famName||'　')+'</div></div>'+
    '<div class="cell" style="flex:1.5"><span class="lab">住所</span><div class="fulltext">'+esc(famAddr||'　')+'</div></div>'+
    '<div class="cell"><span class="lab">電話番号</span><div class="fulltext">'+esc(famTel||'　')+'</div></div>'+
    '<div class="cell" style="border-right:none"><span class="lab">緊急連絡先</span><div class="fulltext">'+esc(emg||'　')+'</div></div>'+
  '</div></div></div>';
  // 事業所
  h+='<div class="sec"><div class="sec-lbl">事業所</div><div class="sec-body">'+
    '<div class="row-cells">'+cell('居宅介護支援事業所',r.careOffice)+cell('介護支援専門員',r.careManager)+cell('電話番号',r.careOfficeTel)+cell('FAX番号',r.careOfficeFax)+'</div>'+
    '<div class="row-cells">'+cell('福祉用具',r.welfareEquip)+cell('担当者',r.welfareEquipStaff)+cell('電話番号',r.welfareEquipTel)+'<div class="cell" style="flex:1;border-right:none"><span class="lab">生活リズム</span><div class="rhythm">'+(rh||'　')+'</div></div></div>'+
  '</div></div>';
  // 医療情報
  h+='<div class="sec"><div class="sec-lbl">医療情報</div><div class="sec-body">'+
    '<div class="row-cells">'+cell('かかりつけ病院',r.hospital)+cell('主治医',r.doctor)+cell('電話番号',r.hospitalTel)+cell('FAX番号',r.hospitalFax)+'</div>'+
    '<div class="row-cells">'+cell('救急搬送先（希望）',r.emergencyHospital)+cell('かかりつけ薬局',r.pharmacy)+cell('電話番号',r.pharmacyTel)+cell('FAX番号',r.pharmacyFax)+'</div>'+
    '<div class="row-cells">'+
      '<div class="cell"><span class="lab">アレルギー</span><div class="fulltext">'+esc(r.allergy||'　')+'</div></div>'+
      '<div class="cell" style="border-right:none"><span class="lab">治療中の病気</span><div class="fulltext">'+esc(r.currentDiseases||'　')+'</div></div>'+
    '</div>'+
    '<div class="row-cells">'+
      '<div class="cell"><span class="lab">副作用・禁忌 等</span><div class="fulltext">'+esc(r.sideEffects||'　')+'</div></div>'+
      '<div class="cell" style="border-right:none"><span class="lab">既往歴</span><div class="fulltext">'+esc(r.pastHistory||'　')+'</div></div>'+
    '</div>'+
    '<div class="cell" style="border-right:none"><span class="lab">■薬剤情報（定期）■</span><div class="fulltext">'+esc(r.medsRegular||'　')+'</div></div>'+
    '<div class="row-cells">'+
      '<div class="cell"><span class="lab">■薬備考■</span><div class="fulltext">'+esc(r.medsNotes||'　')+'</div></div>'+
      '<div class="cell" style="border-right:none"><span class="lab">■問題行動 等■</span><div class="fulltext">'+esc(r.problemBehavior||'　')+'</div></div>'+
    '</div>'+
  '</div></div>';
  // 対象アプリ
  var tApps=Array.isArray(r.targetApps)?r.targetApps:null;
  var tBadges=APP_TARGETS.map(function(p){
    var on=tApps?tApps.indexOf(p[0])>=0:true;
    return'<span class="tag" style="background:'+(on?'var(--ok-l);color:var(--ok)':'var(--g1);color:var(--g5)')+'">'+(on?'✓ ':'– ')+esc(p[1])+'</span>';
  }).join(' ');
  h+='<div class="sec"><div class="sec-lbl">対象</div><div class="sec-body"><div class="cell" style="border-right:none;border-bottom:none"><span class="lab">対象アプリ</span><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:2px">'+tBadges+'</div></div></div></div>';
  h+='</div>';
  $('viewBox').innerHTML=h;
}

/* ═══════════ 編集フォーム ═══════════ */
var editing=null;
function fld(k,label,val,type,opts){
  var v=esc(val==null?'':val);
  var wide=(type==='textarea');
  if(type==='select'){
    var o='<option value=""></option>'+opts.map(function(x){return'<option value="'+esc(x)+'"'+(String(val)===String(x)?' selected':'')+'>'+esc(x)+'</option>'}).join('');
    return'<div class="fld"><label>'+esc(label)+'</label><select data-k="'+k+'">'+o+'</select></div>';
  }
  if(type==='textarea')return'<div class="fld wide"><label>'+esc(label)+'</label><textarea data-k="'+k+'">'+v+'</textarea></div>';
  if(type==='checkbox')return'<div class="fld"><label>'+esc(label)+'</label><select data-k="'+k+'"><option value=""'+(!val?' selected':'')+'>無</option><option value="1"'+(val?' selected':'')+'>有</option></select></div>';
  return'<div class="fld"><label>'+esc(label)+'</label><input data-k="'+k+'" type="'+(type||'text')+'" value="'+v+'"></div>';
}
function openEdit(rec){
  editing=rec?JSON.parse(JSON.stringify(rec)):{id:null,active:true,family:[],rhythm:{}};
  if(!Array.isArray(editing.family))editing.family=[];
  if(!editing.rhythm)editing.rhythm={};
  var r=editing;
  var levels=['','要支援1','要支援2','要介護1','要介護2','要介護3','要介護4','要介護5','自立'];
  var h='';
  h+='<div class="cd"><div class="fgroup"><h3>基本情報</h3><div class="fgrid">'+
    fld('name','氏名',r.name)+fld('kana','ふりがな',r.kana)+fld('room','居室',r.room)+
    fld('gender','性別',r.gender,'select',['女','男'])+
    fld('birthDate','生年月日',r.birthDate,'date')+
    fld('careLevel','介護度',r.careLevel,'select',levels)+
    fld('careCertStart','認定期間(開始)',r.careCertStart,'date')+fld('careCertEnd','認定期間(終了)',r.careCertEnd,'date')+
    fld('copayRate','負担割合',r.copayRate,'select',['1','2','3'])+fld('welfare','生保',r.welfare,'checkbox')+
    fld('admissionDate','入居日',r.admissionDate,'date')+fld('dischargeDate','退去日',r.dischargeDate,'date')+
    fld('height','身長(cm)',r.height,'number')+fld('weight','体重(kg)',r.weight,'number')+
    fld('adl','生活自立度',r.adl)+fld('dementia','認知症自立度',r.dementia)+
    fld('active','在籍状態',r.active===false?'退去':'在籍','select',['在籍','退去'])+
  '</div></div></div>';

  // 対象アプリ（各ケアアプリに表示・記録するか）
  var curTargets=Array.isArray(r.targetApps)?r.targetApps:defaultTargetApps();
  h+='<div class="cd"><div class="fgroup"><h3>対象アプリ（チェックした人だけ各アプリに表示・記録されます）</h3><div class="fgrid">'+
    APP_TARGETS.map(function(p){
      var on=curTargets.indexOf(p[0])>=0;
      return'<label class="fld" style="flex-direction:row;align-items:center;gap:8px;cursor:pointer;border:1px solid var(--g2);border-radius:8px;padding:10px"><input type="checkbox" data-target="'+p[0]+'"'+(on?' checked':'')+' style="width:auto">'+esc(p[1])+'</label>';
    }).join('')+
  '</div><p class="muted" style="margin-top:6px">既定は全てON。対象外の人だけチェックを外してください（既存記録は削除されません）。</p></div></div>';

  h+='<div class="cd"><div class="fgroup"><h3>基本事項</h3>'+
    fld('preAdmission','入居前状況',r.preAdmission,'textarea')+
    fld('postDischarge','退去後状況（行き先等）',r.postDischarge,'textarea')+'</div></div>';

  h+='<div class="cd"><div class="fgroup"><h3>家族情報</h3><div id="famList"></div>'+
    '<button class="btn btn-sec" id="famAdd" type="button">＋ 家族を追加</button></div></div>';

  h+='<div class="cd"><div class="fgroup"><h3>事業所</h3><div class="fgrid">'+
    fld('careOffice','居宅介護支援事業所',r.careOffice)+fld('careManager','介護支援専門員',r.careManager)+
    fld('careOfficeTel','電話番号',r.careOfficeTel)+fld('careOfficeFax','FAX番号',r.careOfficeFax)+
    fld('welfareEquip','福祉用具',r.welfareEquip)+fld('welfareEquipStaff','担当者',r.welfareEquipStaff)+fld('welfareEquipTel','電話番号',r.welfareEquipTel)+
  '</div><h3 style="margin-top:14px">生活リズム</h3><div class="fgrid">'+
    RHYTHM_KEYS.map(function(p){return'<div class="fld"><label>'+esc(p[1])+'</label><input data-rhythm="'+p[0]+'" type="time" value="'+esc(r.rhythm[p[0]]||'')+'"></div>'}).join('')+
  '</div></div></div>';

  h+='<div class="cd"><div class="fgroup"><h3>医療情報</h3><div class="fgrid">'+
    fld('hospital','かかりつけ病院',r.hospital)+fld('doctor','主治医',r.doctor)+
    fld('hospitalTel','電話番号',r.hospitalTel)+fld('hospitalFax','FAX番号',r.hospitalFax)+
    fld('emergencyHospital','救急搬送先（希望）',r.emergencyHospital)+
    fld('pharmacy','かかりつけ薬局',r.pharmacy)+fld('pharmacyTel','電話番号',r.pharmacyTel)+fld('pharmacyFax','FAX番号',r.pharmacyFax)+
  '</div>'+
    fld('allergy','アレルギー',r.allergy,'textarea')+
    fld('currentDiseases','治療中の病気',r.currentDiseases,'textarea')+
    fld('sideEffects','副作用・禁忌 等',r.sideEffects,'textarea')+
    fld('pastHistory','既往歴',r.pastHistory,'textarea')+
    fld('medsRegular','薬剤情報（定期）',r.medsRegular,'textarea')+
    fld('medsNotes','薬備考',r.medsNotes,'textarea')+
    fld('problemBehavior','問題行動 等',r.problemBehavior,'textarea')+
  '</div></div>';

  $('editBox').innerHTML=h;
  renderFamRows();
  $('famAdd').addEventListener('click',function(){editing.family.push({name:'',relation:'',role:'',address:'',phone:'',emergency:false});collectFam();renderFamRows()});
  showScreen('edit');
}
function renderFamRows(){
  var box=$('famList');var h='';
  editing.family.forEach(function(f,i){
    h+='<div class="fam-row" data-i="'+i+'">'+
      '<div class="fld"><label>氏名</label><input data-fk="name" value="'+esc(f.name)+'"></div>'+
      '<div class="fld"><label>続柄</label><input data-fk="relation" value="'+esc(f.relation)+'"></div>'+
      '<div class="fld"><label>役割（KP/金銭管理等）</label><input data-fk="role" value="'+esc(f.role)+'"></div>'+
      '<div class="fld"><label>電話番号</label><input data-fk="phone" value="'+esc(f.phone)+'"></div>'+
      '<div class="fld full"><label>住所</label><input data-fk="address" value="'+esc(f.address)+'"></div>'+
      '<div class="fld"><label>緊急連絡先</label><select data-fk="emergency"><option value=""'+(!f.emergency?' selected':'')+'>—</option><option value="1"'+(f.emergency?' selected':'')+'>緊急連絡先</option></select></div>'+
      '<button class="fam-del" type="button" data-del="'+i+'">削除</button>'+
    '</div>';
  });
  box.innerHTML=h;
  Array.prototype.forEach.call(box.querySelectorAll('[data-del]'),function(b){b.addEventListener('click',function(){collectFam();editing.family.splice(parseInt(this.getAttribute('data-del')),1);renderFamRows()})});
}
function collectFam(){
  Array.prototype.forEach.call($('famList').querySelectorAll('.fam-row'),function(row){
    var i=parseInt(row.getAttribute('data-i'));if(isNaN(i)||!editing.family[i])return;
    Array.prototype.forEach.call(row.querySelectorAll('[data-fk]'),function(inp){
      var k=inp.getAttribute('data-fk');
      editing.family[i][k]=(k==='emergency')?!!inp.value:inp.value.trim();
    });
  });
}
function collectForm(){
  var rec={};
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-k]'),function(inp){
    var k=inp.getAttribute('data-k');var v=inp.value;
    if(k==='active'){rec.active=(v!=='退去');return}
    if(k==='welfare'){rec.welfare=!!v;return}
    rec[k]=(typeof v==='string')?v.trim():v;
  });
  rec.rhythm={};
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-rhythm]'),function(inp){if(inp.value)rec.rhythm[inp.getAttribute('data-rhythm')]=inp.value});
  rec.targetApps=[];
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-target]'),function(inp){if(inp.checked)rec.targetApps.push(inp.getAttribute('data-target'))});
  collectFam();
  rec.family=editing.family.filter(function(f){return f.name||f.phone||f.address});
  rec.id=editing.id;
  if(editing.xref)rec.xref=editing.xref;
  // ホワイトリスト適用
  var clean={};ALLOWED_KEYS.forEach(function(k){if(rec[k]!==undefined)clean[k]=rec[k]});
  return clean;
}
function saveResident(){
  var rec=collectForm();
  if(!rec.name){toast('⚠️ 氏名は必須です');return}
  if(!CFG.url){toast('⚠️ 同期設定のURLが未設定です');return}
  rec.updatedAt=new Date().toISOString();
  $('saveBtn').disabled=true;setSync('保存中…');
  apiPost({action:'saveResident',record:rec}).then(function(d){
    var saved=(d&&d.record)||d;
    setSync('保存OK','ok');toast('✅ 保存しました');
    // roster を更新（軽量行のみ）
    var row=normRosterRow(saved.id!=null?saved:rec);
    var idx=-1;for(var i=0;i<roster.length;i++){if(String(roster[i].id)===String(row.id)){idx=i;break}}
    if(idx>=0)roster[idx]=row;else roster.push(row);
    saveRosterCache();writeCommonRoster();
    openResident(row.id);
  }).catch(function(e){setSync('保存失敗','err');toast('⚠️ 保存に失敗: '+e.message)}).then(function(){$('saveBtn').disabled=false});
}

/* ═══════════ 画面遷移 ═══════════ */
function showScreen(name){
  ['list','view','edit'].forEach(function(s){var el=$('sc-'+s);if(el)el.classList.toggle('on',s===name)});
  Array.prototype.forEach.call(document.querySelectorAll('.bnav button'),function(b){b.classList.toggle('on',b.getAttribute('data-sc')===name)});
  if(name==='list')window.scrollTo(0,0);
}

/* ═══════════ 同期設定 ═══════════ */
function openSync(){$('cfgUrl').value=CFG.url;$('cfgToken').value=CFG.token;$('mSync').classList.add('on')}
function closeSync(){$('mSync').classList.remove('on')}
function saveSyncCfg(){
  CFG.url=$('cfgUrl').value.trim();CFG.token=$('cfgToken').value.trim();
  try{localStorage.setItem(CFG_KEY,JSON.stringify(CFG))}catch(e){}
  closeSync();refreshRoster();
}
function testSync(){
  if(!$('cfgUrl').value.trim()){toast('URLを入力してください');return}
  var saved={url:CFG.url,token:CFG.token};CFG.url=$('cfgUrl').value.trim();CFG.token=$('cfgToken').value.trim();
  apiGet({action:'ping'},8000).then(function(){toast('✅ 接続OK')}).catch(function(e){toast('⚠️ 接続失敗: '+e.message)}).then(function(){CFG.url=saved.url;CFG.token=saved.token});
}

/* ═══════════ 初期化 ═══════════ */
function init(){
  loadRosterCache();renderRoster();
  if(roster.length)writeCommonRoster(); // 起動時に共有キーを最新化（他アプリが即参照可）
  $('q').addEventListener('input',renderRoster);
  Array.prototype.forEach.call($('filterRow').querySelectorAll('.chip'),function(c){
    c.addEventListener('click',function(){curFilter=this.getAttribute('data-f');
      Array.prototype.forEach.call($('filterRow').querySelectorAll('.chip'),function(x){x.classList.toggle('on',x===c)});renderRoster()});
  });
  Array.prototype.forEach.call(document.querySelectorAll('.bnav button'),function(b){
    b.addEventListener('click',function(){var sc=this.getAttribute('data-sc');
      if(sc==='new'){openEdit(null)}else if(sc==='sync'){openSync()}else{showScreen('list')}});
  });
  $('backBtn').addEventListener('click',function(){showScreen('list')});
  $('editBtn').addEventListener('click',function(){if(curResident)openEdit(curResident)});
  $('printBtn').addEventListener('click',function(){window.print()});
  $('editCancel').addEventListener('click',function(){if(curResident)openResident(curResident.id);else showScreen('list')});
  $('saveBtn').addEventListener('click',saveResident);
  $('syncClose').addEventListener('click',closeSync);
  $('syncTest').addEventListener('click',testSync);
  $('syncSave').addEventListener('click',saveSyncCfg);
  $('mSync').addEventListener('click',function(e){if(e.target===this)closeSync()});
  if(CFG.url)refreshRoster();else setSync('未接続');
}
document.addEventListener('DOMContentLoaded',init);
</script>
